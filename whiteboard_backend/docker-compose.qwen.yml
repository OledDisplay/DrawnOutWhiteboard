services:
  qwen-worker:
    build:
      context: .
      dockerfile: Dockerfile.qwen-worker
    container_name: drawnout_qwen_worker
    ports:
      - "8009:8009"
    gpus: all
    shm_size: "8gb"
    ipc: host
    volumes:
      - .:/workspace/whiteboard_backend
      - qwen_hf_cache:/models/huggingface
    environment:
      HF_HOME: /models/huggingface
      HUGGINGFACE_HUB_CACHE: /models/huggingface
      TRANSFORMERS_CACHE: /models/huggingface
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    restart: unless-stopped

volumes:
  qwen_hf_cache:
